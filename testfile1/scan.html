<label>Input Manual (Format: ICS24-02-072):</label>
<div class="manual-row">
  <input type="text" id="manualId" 
         placeholder="ICS24-02-072" 
         maxlength="12" 
         oninput="applyMask(this)"
         onkeypress="handleKeyPress(event)">
  <button class="btn-add-manual" onclick="addManualId()">Tambah</button>
</div>

<script>
  let scanner = null;
  let scannedIds = new Set();
  
  let session = JSON.parse(localStorage.getItem('currentSpotcheckSession'));
  const kelasIdx = localStorage.getItem('currentKelasIndex');
  
  // Enforce the Format: XXX00-00-000 (e.g., ICS24-02-072)
  function applyMask(input) {
    let value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    let formatted = "";

    for (let i = 0; i < value.length; i++) {
      if (i === 5 || i === 7) formatted += "-";
      formatted += value[i];
    }
    input.value = formatted.substring(0, 12);
  }

  function handleKeyPress(e) {
    if (e.key === "Enter") addManualId();
  }

  function addManualId() {
    const input = document.getElementById('manualId');
    const val = input.value.trim();
    // Validate length (3 chars + dash + 2 chars + dash + 3 chars = 12)
    if (val.length < 12) return alert("Format ID tidak lengkap! (Contoh: ICS24-02-072)");
    
    addToQueue(val);
    input.value = "";
    input.focus();
  }

  function addToQueue(id) {
    const cleanId = id.trim().toUpperCase();
    if (!scannedIds.has(cleanId)) {
      scannedIds.add(cleanId);
      renderQueue();
      if (navigator.vibrate) navigator.vibrate(100);
    }
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    list.innerHTML = '';
    scannedIds.forEach(id => {
      const item = document.createElement('div');
      item.className = 'student-item';
      item.innerHTML = `<span>${id}</span> <span class="remove" onclick="removeId('${id}')">Hapus</span>`;
      list.appendChild(item);
    });
    document.getElementById('count').innerText = scannedIds.size;
  }

  function removeId(id) {
    scannedIds.delete(id);
    renderQueue();
  }

  async function saveBatch() {
    const cat = document.getElementById('category').value;
    if (!cat) return alert("Sila pilih jenis kesalahan!");
    if (scannedIds.size === 0) return alert("Sila imbas QR atau taip ID!");

    if (!session.kelasList[kelasIdx].batches) session.kelasList[kelasIdx].batches = [];
    
    const currentBatches = session.kelasList[kelasIdx].batches;
    const newStudents = Array.from(scannedIds);

    // SMART CHECK: Does this category already exist in this session?
    const existingBatch = currentBatches.find(b => b.category === cat);

    if (existingBatch) {
      // Merge students and remove duplicates using Set
      const mergedSet = new Set([...existingBatch.students, ...newStudents]);
      existingBatch.students = Array.from(mergedSet);
      existingBatch.time = new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' }); // Update time to latest
    } else {
      // Add as new batch
      currentBatches.push({
        category: cat,
        students: newStudents,
        time: new Date().toLocaleTimeString('ms-MY', { hour: '2-digit', minute: '2-digit' })
      });
    }

    localStorage.setItem('currentSpotcheckSession', JSON.stringify(session));
    
    alert(`Data dikemaskini untuk: ${cat}`);
    
    scannedIds.clear();
    renderQueue();
    document.getElementById('category').value = ""; 
    renderHistory();
  }

  function renderHistory() {
    const historyList = document.getElementById('historyList');
    const batches = session.kelasList[kelasIdx].batches || [];
    if (batches.length === 0) {
      historyList.innerHTML = "Tiada rekod disimpan lagi.";
      return;
    }
    historyList.innerHTML = batches.map(b => `
      <div class="history-item">
        <b>[${b.time}] ${b.category}</b>: ${b.students.length} pelajar
        <br><small>${b.students.join(', ')}</small>
      </div>
    `).reverse().join('');
  }

  function startScanner() {
    document.getElementById('reader').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render((text) => addToQueue(text));
  }

  renderHistory();
</script>
